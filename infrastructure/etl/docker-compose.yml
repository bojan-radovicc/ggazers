version: "3.3"
services:
  spark-master:
    build: .
    ports:
      - "9090:8080"
      - "7077:7077"
      - "2222:22"
    volumes:
       - ../../etl/transformation:/opt/app/transformation
       - ../../etl/load:/opt/app/load
    environment:
      - SPARK_LOCAL_IP=spark-master
      - SPARK_WORKLOAD=master
    networks:
      - ggazers_nw
    command: >
             bash -c "/etc/init.d/ssh start && ./start-spark.sh"

  spark-worker-a:
    build: .
    ports:
      - "9091:8080"
      - "7000:7000"
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=1G
      - SPARK_DRIVER_MEMORY=1G
      - SPARK_EXECUTOR_MEMORY=1G
      - SPARK_WORKLOAD=worker
      - SPARK_LOCAL_IP=spark-worker-a
    volumes:
       - ../../etl/transformation:/opt/app/transformation
       - ../../etl/load:/opt/app/load
    networks:
      - ggazers_nw
    command: >
             bash -c "/etc/init.d/ssh start && ./start-spark.sh"

  namenode:
    platform: linux/amd64
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=gg
      - HADOOP_OPTS=-Djava.net.preferIPv4Stack=true -Dsun.net.inetaddr.ttl=0
    ports:
      - "9870:9870"   # UI
      - "9000:9000"   # HDFS
    env_file:
      - ./hadoop.env
    volumes:
      - namenode:/hadoop/dfs/name
      - ../../data:/opt/data
    networks:
      - ggazers_nw

  datanode:
    platform: linux/amd64
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      - CLUSTER_NAME=gg
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HADOOP_OPTS=-Djava.net.preferIPv4Stack=true -Dsun.net.inetaddr.ttl=0
    env_file:
      - ./hadoop.env
    volumes:
      - datanode:/hadoop/dfs/data
      - ../../data:/opt/data
    depends_on:
      - namenode
    networks:
      - ggazers_nw

networks:
  ggazers_nw:
    driver: bridge
    name: ggazers_nw

volumes:
  namenode:
  datanode:
  data:
  citus_data: